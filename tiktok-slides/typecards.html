<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>paternia 20タイプカード画像ジェネレータ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>

    flex-wrap:wrap;

  .controls button{
    background:var(--accent);
    color:#000;
    border:none;

    font-family:inherit;

    transition:transform 0.1s;

  .controls button:hover{transform:translateY(-1px);opacity:0.9}
  .controls button:disabled{opacity:0.5;cursor:wait}
  .controls .secondary{
    background:transparent;

  }
  .status{
    max-width:1400px;
    margin:0 auto 24px;

    border-radius:8px;
    background:rgba(157,143,255,0.1);
    border:1px solid rgba(157,143,255,0.3);
    color:var(--text-muted);
    font-size:13px;
    min-height:44px;
    display:flex;
    align-items:center;
  }
  .grid{
    max-width:1400px;
    margin:0 auto;
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
    gap:12px;
  }
  .mini-card{
    border:1px solid rgba(255,255,255,0.1);
    border-radius:10px;
    background:var(--bg-card);
    overflow:hidden;
    cursor:pointer;
    transition:transform 0.1s,border-color 0.1s;
  }
  .mini-card:hover{transform:scale(1.03);border-color:var(--accent)}
  .mini-preview{
    aspect-ratio:1080/1920;
    overflow:hidden;
    position:relative;
  }
  .mini-preview .scaled{
    width:1080px;
    height:1920px;
    transform:scale(calc(180 / 1080));
    transform-origin:top left;
    position:absolute;
    top:0;left:0;
  }
  .mini-meta{
    padding:8px 10px;
    font-size:11px;
    color:var(--text-muted);
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:6px;
  }
  .mini-meta .code{
    font-family:"Fredoka",sans-serif;
    color:var(--accent);
    font-weight:600;
  }
  .mini-meta .name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .t-control{
    display:flex;
    align-items:center;
    gap:4px;
    background:rgba(157,143,255,0.08);
    border:1px solid rgba(157,143,255,0.2);
    border-radius:6px;
    padding:2px 4px;
  }
  .t-control button{
    width:20px;height:20px;
    background:transparent;
    border:none;
    color:var(--accent);
    font-weight:700;
    cursor:pointer;
    font-size:14px;
    line-height:1;
    padding:0;
    border-radius:4px;
  }
  .t-control button:hover{background:rgba(157,143,255,0.2)}
  .t-control .val{
    min-width:34px;
    text-align:center;
    font-family:"Fredoka",sans-serif;
    color:var(--accent);
    font-size:12px;
  }

  /* =============== MAIN CARD (1080 x 1920) =============== */
  #renderRoot{
    position:fixed;
    left:-99999px;
    top:0;
  }
  .card{
    width:1080px;
    height:1920px;
    position:relative;
    overflow:hidden;
    background:#0a0a1a;
    color:#fff;
    font-family:"M PLUS Rounded 1c","Kiwi Maru",sans-serif;
    display:flex;
    flex-direction:column;
    align-items:center;
  }
  .card .bg-gradient{
    position:absolute;inset:0;
    background:
      radial-gradient(circle at 25% 10%,rgba(157,143,255,0.18) 0%,transparent 50%),
      radial-gradient(circle at 80% 90%,rgba(255,180,110,0.13) 0%,transparent 45%);
    pointer-events:none;
  }
  .card .orb1,.card .orb2{
    position:absolute;border-radius:50%;filter:blur(110px);pointer-events:none;
  }
  .card .orb1{width:540px;height:540px;left:-160px;top:-160px;background:rgba(157,143,255,0.3)}
  .card .orb2{width:460px;height:460px;right:-140px;bottom:-140px;background:rgba(255,180,120,0.2)}

  .card .badge{

<body>

<header>
  <h1>paternia / 20タイプカード画像ジェネレータ</h1>
  <p>
    1タイプ1枚、計20枚の 1080 × 1920 画像を生成。<br>
    各画像は「パターンアート + タイプコード + 日本語名 + 一言」を含む、LINE・TikTok・Instagram 共通フォーマット。
  </p>
</header>

<div class="controls">
  <button id="dlAllBtn">全20枚ダウンロード (ZIP)</button>
  <button class="secondary" id="reloadBtn">再描画</button>
  <button class="secondary" id="exportTsBtn">t値JSONをコピー</button>
</div>

<div class="status" id="status">準備中…</div>

<div class="section-title">AXIS GROUPS · 軸別カバー 5 枚</div>
<div class="grid" id="groupGrid"></div>

<div class="section-title">INDIVIDUAL TYPES · 20 タイプ個別</div>
<div class="grid" id="grid"></div>

<div id="renderRoot"></div>

<script>
// ====================================================
// Type data (20 types with one-liner catch)
// ====================================================
const TYPES = [
  // O支配
  { code:"OC", primary:"O", secondary:"C", name:"星の設計者",   catch:"混沌に秩序を見る、宇宙を設計する知性", t:3.2 },
  { code:"OE", primary:"O", secondary:"E", name:"虹色の旅人",   catch:"100の興味が止まらない、アイデアの泉", t:2.0 },
  { code:"OA", primary:"O", secondary:"A", name:"墨の語り部",   catch:"余白を愛する、静かな美意識", t:1.5 },
  { code:"ON", primary:"O", secondary:"N", name:"夢の建築家",   catch:"不安と想像が交差する、幻想作家", t:5.2 },
  // C支配
  { code:"CO", primary:"C", secondary:"O", name:"氷の観測者",   catch:"冷静の奥に真理がある、科学者の目", t:2.6 },
  { code:"CE", primary:"C", secondary:"E", name:"道筋の司令",   catch:"複雑を整える、組織化の匠", t:1.0 },
  { code:"CA", primary:"C", secondary:"A", name:"藍色の守り手", catch:"続ける力が最強、伝統の職人", t:1.2 },
  { code:"CN", primary:"C", secondary:"N", name:"震えの書記",   catch:"心配性が精度を生む、完璧主義者", t:1.5 },
  // E支配
  { code:"EO", primary:"E", secondary:"O", name:"夜空の革命児", catch:"派手と新しさを振りまく花火", t:1.8 },
  { code:"EC", primary:"E", secondary:"C", name:"黄金の王",     catch:"規律と輝きを両立、王道のリーダー", t:2.2 },
  { code:"EA", primary:"E", secondary:"A", name:"祭りの先導者", catch:"人を繋ぐ、暖かい太陽", t:1.2 },
  { code:"EN", primary:"E", secondary:"N", name:"赤色の咆哮",   catch:"感情を燃やす、情熱の表現者", t:2.0 },
  // A支配
  { code:"AO", primary:"A", secondary:"O", name:"森を紡ぐ者",   catch:"見えない糸を結ぶ、知恵の支え手", t:3.5 },
  { code:"AC", primary:"A", secondary:"C", name:"毛糸の匠",     catch:"丁寧に結ぶ、慈しみの手仕事", t:1.2 },
  { code:"AE", primary:"A", secondary:"E", name:"陽だまりの主", catch:"和ませる、癒しの中心", t:1.8 },
  { code:"AN", primary:"A", secondary:"N", name:"花びらの詩",   catch:"繊細さが才能、共感の天才 (HSP)", t:2.5 },
  // N支配
  { code:"NO", primary:"N", secondary:"O", name:"時を溶かす者",   catch:"闇から作品を生む、ダーク・クリエイター", t:2.0 },
  { code:"NC", primary:"N", secondary:"C", name:"点描の巡礼",     catch:"繰り返しに完璧を求める、求道の職人", t:2.8 },
  { code:"NE", primary:"N", secondary:"E", name:"警鐘を鳴らす者", catch:"危機を察知する、鋭い直感", t:0.6 },
  { code:"NA", primary:"N", secondary:"A", name:"雨音の詩人",     catch:"憂いを美しさに変える、柔らかい感性", t:1.8 },
];

// ====================================================
// Axis groups (5 cover cards, one per dominant axis)
// ====================================================
const AXIS_GROUPS = [
  { axis:"O", jp:"開放性",     en:"OPENNESS",          sub:"好奇心型",   hook:"好奇心 × 想像力 の 4 タイプ" },
  { axis:"C", jp:"誠実性",     en:"CONSCIENTIOUSNESS", sub:"規律型",     hook:"秩序 × 継続 の 4 タイプ" },
  { axis:"E", jp:"外向性",     en:"EXTRAVERSION",      sub:"活動型",     hook:"社交 × 刺激 の 4 タイプ" },
  { axis:"A", jp:"協調性",     en:"AGREEABLENESS",     sub:"共感型",     hook:"共感 × 調和 の 4 タイプ" },
  { axis:"N", jp:"神経症傾向", en:"NEUROTICISM",       sub:"感受型",     hook:"感受性 × 内省 の 4 タイプ" },
];

// ====================================================
// Score helper
// ====================================================
function makeScores(primary, secondary){
  const scores = { O:0.3, C:0.3, E:0.3, A:0.3, N:0.3 };
  scores[primary] = 0.9;
  scores[secondary] = 0.7;
  return scores;
}

// ====================================================
// Pattern draw (single frame, static)
// ====================================================
// === サイトと完全一致させるため、内部は 260px の座標系で描画し、
//     canvas は 3.3 倍の解像度で出力する。これで線の太さ・点サイズ・密度が
//     サイトの /gallery/XX で見る絵と一致する。
function drawPatternToCanvas(canvas, type){
  const displaySize = 860;   // canvas 実ピクセル
  const drawSize = 260;      // サイトの PatternCanvas と同じ内部座標系
  const scale = displaySize / drawSize;

  // canvas の実解像度を再設定(毎回クリーンに)
  canvas.width = displaySize;
  canvas.height = displaySize;
  const ctx = canvas.getContext("2d");

  const scores = makeScores(type.primary, type.secondary);
  const seed = Math.round(
    scores.O * 1000 + scores.C * 777 + scores.E * 333 + scores.A * 111 + scores.N * 55
  );
  const drawFn = window.PATERNIA_DRAW_FUNCTIONS && window.PATERNIA_DRAW_FUNCTIONS[type.code];
  const noise = window.PATERNIA_CREATE_NOISE && window.PATERNIA_CREATE_NOISE(seed);
  if (!drawFn || !noise) {
    ctx.fillStyle = "#12122a";
    ctx.fillRect(0, 0, displaySize, displaySize);
    return;
  }
  const t = typeof type.t === "number" ? type.t : 0.5;

  // 3.3x スケールで描画 -> 線幅・点サイズがサイト基準に保たれる
  ctx.scale(scale, scale);

  ctx.save();
  ctx.beginPath();
  ctx.arc(drawSize / 2, drawSize / 2, drawSize / 2 - 1, 0, Math.PI * 2);
  ctx.clip();
  drawFn(ctx, drawSize, scores, noise, t);
  ctx.restore();

  // subtle border (drawSize 座標系のまま)
  ctx.strokeStyle = "rgba(255,255,255,0.12)";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(drawSize / 2, drawSize / 2, drawSize / 2 - 1, 0, Math.PI * 2);
  ctx.stroke();
}

// ====================================================
// Render card
// ====================================================
function renderCard(type){
  const card = document.createElement("div");
  card.className = "card var-" + type.primary;
  card.dataset.code = type.code;
  card.innerHTML = `
    <div class="bg-gradient"></div>
    <div class="orb1"></div>
    <div class="orb2"></div>

    <div class="badge">BIG 5 RESEARCH</div>

    <div class="art-frame">
      <canvas width="860" height="860"></canvas>
    </div>

    <div class="code">${type.code}</div>
    <div class="name">${type.name}</div>
    <div class="catch">${type.catch}</div>

    <div class="foot">
      <div class="brand">paternia</div>
      <div class="url">paternia.netlify.app</div>
      <div class="mini">FREE 45Q DIAGNOSIS</div>
    </div>
  `;
  const canvas = card.querySelector("canvas");
  drawPatternToCanvas(canvas, type);
  return card;
}

// ====================================================
// Group card rendering (axis-level cover)
// ====================================================
function renderGroupCard(group){
  const card = document.createElement("div");
  card.className = "gcard axis-" + group.axis;
  card.dataset.group = group.axis;

  card.innerHTML = `
    <div class="bg-gradient"></div>
    <div class="orb1"></div>
    <div class="orb2"></div>

    <div class="head">
      <div class="tag">BIG 5 RESEARCH</div>
      <div class="axiscode">${group.axis}</div>
      <div class="axislabel">${group.jp}</div>
      <div class="axiseng">${group.en}</div>
    </div>

    <div class="big-q">
      <div class="q-line">あなたは</div>
      <div class="q-main">どのタイプ?</div>
      <div class="q-sub">${group.hook}</div>
    </div>

    <div class="foot">
      <div class="brand">paternia</div>
      <div class="url">paternia.netlify.app</div>
      <div class="mini">FREE 45Q DIAGNOSIS</div>
    </div>
  `;

  return card;
}

function drawPatternToGroupCanvas(canvas, type, displaySize){
  const drawSize = 260;
  const scale = displaySize / drawSize;
  canvas.width = displaySize;
  canvas.height = displaySize;
  const ctx = canvas.getContext("2d");

  const scores = makeScores(type.primary, type.secondary);
  const seed = Math.round(
    scores.O * 1000 + scores.C * 777 + scores.E * 333 + scores.A * 111 + scores.N * 55
  );
  const drawFn = window.PATERNIA_DRAW_FUNCTIONS && window.PATERNIA_DRAW_FUNCTIONS[type.code];
  const noise = window.PATERNIA_CREATE_NOISE && window.PATERNIA_CREATE_NOISE(seed);
  if (!drawFn || !noise) {
    ctx.fillStyle = "#12122a";
    ctx.fillRect(0, 0, displaySize, displaySize);
    return;
  }
  const t = typeof type.t === "number" ? type.t : 0.5;

  ctx.scale(scale, scale);

  ctx.save();
  ctx.beginPath();
  ctx.arc(drawSize / 2, drawSize / 2, drawSize / 2 - 1, 0, Math.PI * 2);
  ctx.clip();
  drawFn(ctx, drawSize, scores, noise, t);
  ctx.restore();

  ctx.strokeStyle = "rgba(255,255,255,0.15)";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(drawSize / 2, drawSize / 2, drawSize / 2 - 1, 0, Math.PI * 2);
  ctx.stroke();
}

function redrawGroup(group){
  const oldCard = renderRoot.querySelector(`.gcard[data-group="${group.axis}"]`);
  if (oldCard) oldCard.remove();
  const oldMini = groupGrid.querySelector(`.mini-card[data-group="${group.axis}"]`);

  const card = renderGroupCard(group);
  renderRoot.appendChild(card);

  const mini = document.createElement("div");
  mini.className = "mini-card";
  mini.dataset.group = group.axis;
  mini.innerHTML = `
    <div class="mini-preview">
      <div class="scaled" data-group="${group.axis}"></div>
    </div>
    <div class="mini-meta">
      <span class="code">${group.axis}系</span>
      <span class="name">${group.jp} / ${group.sub}</span>
    </div>
  `;
  // clone (no canvases needed now — text-only cover)
  const clone = card.cloneNode(true);
  mini.querySelector(".scaled").appendChild(clone);
  mini.querySelector(".mini-preview").addEventListener("click", ()=>downloadGroup(group.axis));

  if (oldMini) {
    groupGrid.replaceChild(mini, oldMini);
  } else {
    groupGrid.appendChild(mini);
  }
}

// ====================================================
// Build all
// ====================================================
const renderRoot = document.getElementById("renderRoot");
const grid = document.getElementById("grid");
const statusEl = document.getElementById("status");

const groupGrid = document.getElementById("groupGrid");

function buildAll(){
  if (!window.PATERNIA_DRAW_FUNCTIONS){
    statusEl.textContent = "pattern-canvas.js を読み込み中…";
    setTimeout(buildAll, 300);
    return;
  }
  renderRoot.innerHTML = "";
  grid.innerHTML = "";
  groupGrid.innerHTML = "";
  AXIS_GROUPS.forEach((g)=>redrawGroup(g));
  TYPES.forEach((type)=>redrawOne(type));
  const total = TYPES.length + AXIS_GROUPS.length;
  statusEl.textContent = `${total}枚を描画完了(軸別${AXIS_GROUPS.length} + 個別${TYPES.length})。− / + でt値微調整、プレビュークリックで個別DL、上部ボタンでZIP一括DL。`;
}

function redrawOne(type){
  // Remove existing card + mini for this type if any
  const oldCard = renderRoot.querySelector(`.card[data-code="${type.code}"]`);
  if (oldCard) oldCard.remove();
  const oldMini = grid.querySelector(`.mini-card[data-code="${type.code}"]`);

  const card = renderCard(type);
  renderRoot.appendChild(card);

  const mini = document.createElement("div");
  mini.className = "mini-card";
  mini.dataset.code = type.code;
  mini.innerHTML = `
    <div class="mini-preview">
      <div class="scaled" data-code="${type.code}"></div>
    </div>
    <div class="mini-meta">
      <span class="code">${type.code}</span>
      <span class="name">${type.name}</span>
      <div class="t-control">
        <button class="t-minus" type="button" aria-label="t を 0.1 減らす">−</button>
        <span class="val">${type.t.toFixed(1)}</span>
        <button class="t-plus" type="button" aria-label="t を 0.1 増やす">+</button>
      </div>
    </div>
  `;
  // clone with its canvas content
  const clone = card.cloneNode(true);
  drawPatternToCanvas(clone.querySelector("canvas"), type);
  mini.querySelector(".scaled").appendChild(clone);

  // mini preview click -> download
  mini.querySelector(".mini-preview").addEventListener("click", ()=>downloadOne(type.code));

  // t-control handlers
  mini.querySelector(".t-minus").addEventListener("click", (e)=>{
    e.stopPropagation();
    type.t = Math.max(0, +(type.t - 0.1).toFixed(1));
    redrawOne(type);
    const g = AXIS_GROUPS.find(ax => ax.axis === type.primary);
    if (g) redrawGroup(g);
  });
  mini.querySelector(".t-plus").addEventListener("click", (e)=>{
    e.stopPropagation();
    type.t = +(type.t + 0.1).toFixed(1);
    redrawOne(type);
    const g = AXIS_GROUPS.find(ax => ax.axis === type.primary);
    if (g) redrawGroup(g);
  });

  // insert at original index to preserve order
  const idx = TYPES.findIndex(t => t.code === type.code);
  if (oldMini) {
    grid.replaceChild(mini, oldMini);
  } else {
    // place at correct position
    const children = grid.children;
    if (idx >= children.length) grid.appendChild(mini);
    else grid.insertBefore(mini, children[idx]);
  }
}

// ====================================================
// Download
// ====================================================
async function captureCard(code){
  const el = renderRoot.querySelector(`.card[data-code="${code}"]`);
  if (!el) return null;
  return await html2canvas(el, {
    width: 1080, height: 1920, scale: 1,
    backgroundColor: "#0a0a1a", useCORS: true, logging: false,
  });
}

async function captureGroup(axis){
  const el = renderRoot.querySelector(`.gcard[data-group="${axis}"]`);
  if (!el) return null;
  return await html2canvas(el, {
    width: 1080, height: 1920, scale: 1,
    backgroundColor: "#0a0a1a", useCORS: true, logging: false,
  });
}

async function downloadOne(code){
  const type = TYPES.find(t => t.code === code);
  if (!type) return;
  statusEl.textContent = `${code} (${type.name}) のカードを生成中…`;
  const canvas = await captureCard(code);
  if (!canvas){ statusEl.textContent = "生成に失敗しました"; return; }
  canvas.toBlob((blob)=>{
    saveAs(blob, `paternia-card-${code}.png`);
    statusEl.textContent = `${code} ダウンロード完了。`;
  },"image/png");
}

async function downloadGroup(axis){
  const group = AXIS_GROUPS.find(g => g.axis === axis);
  if (!group) return;
  statusEl.textContent = `${axis}系 (${group.jp}) のカバーを生成中…`;
  const canvas = await captureGroup(axis);
  if (!canvas){ statusEl.textContent = "生成に失敗しました"; return; }
  canvas.toBlob((blob)=>{
    saveAs(blob, `paternia-group-${axis}.png`);
    statusEl.textContent = `${axis}系 カバー ダウンロード完了。`;
  },"image/png");
}

async function downloadAll(){
  const btn = document.getElementById("dlAllBtn");
  btn.disabled = true;
  const zip = new JSZip();
  const total = AXIS_GROUPS.length + TYPES.length;
  let idx = 0;

  // groups first
  for (let i = 0; i < AXIS_GROUPS.length; i++) {
    const g = AXIS_GROUPS[i];
    idx++;
    statusEl.textContent = `ZIP生成中: ${idx}/${total} (${g.axis}系 ${g.jp})…`;
    const canvas = await captureGroup(g.axis);
    if (!canvas) continue;
    const b64 = canvas.toDataURL("image/png").split(",")[1];
    zip.file(`paternia-group-${g.axis}.png`, b64, { base64: true });
  }

  // individual types
  for (let i = 0; i < TYPES.length; i++) {
    const t = TYPES[i];
    idx++;
    statusEl.textContent = `ZIP生成中: ${idx}/${total} (${t.code} ${t.name})…`;
    const canvas = await captureCard(t.code);
    if (!canvas) continue;
    const b64 = canvas.toDataURL("image/png").split(",")[1];
    zip.file(`paternia-card-${t.code}.png`, b64, { base64: true });
  }

  statusEl.textContent = "ZIP書き出し中…";
  const blob = await zip.generateAsync({ type: "blob" });
  saveAs(blob, "paternia-type-cards.zip");
  btn.disabled = false;
  statusEl.textContent = `全${total}枚(軸別${AXIS_GROUPS.length} + 個別${TYPES.length})、ZIPダウンロード完了。`;
}

document.getElementById("dlAllBtn").addEventListener("click", downloadAll);
document.getElementById("reloadBtn").addEventListener("click", buildAll);
document.getElementById("exportTsBtn").addEventListener("click", ()=>{
  const json = JSON.stringify(
    TYPES.reduce((acc, t) => { acc[t.code] = t.t; return acc; }, {}),
    null, 2
  );
  navigator.clipboard.writeText(json).then(()=>{
    statusEl.textContent = "t 値 JSON をクリップボードにコピーしました: " + json.replace(/\s+/g, " ").slice(0, 80) + "…";
  }).catch(()=>{
    statusEl.textContent = "コピー失敗。コンソールに出力します。";
    console.log(json);
  });
});
window.addEventListener("load", ()=>{
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(()=>setTimeout(buildAll, 200));
  } else {
    setTimeout(buildAll, 500);
  }
});
</script>
