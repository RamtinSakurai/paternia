// ===================================================================
// Rendering
// ===================================================================
function renderSlide(postId, slideIdx, slide){
  const el = document.createElement("div");
  el.className = "slide bg-" + slide.bg;
  el.dataset.slideId = `post-${postId}-${slideIdx}`;
  const totalSlides = POSTS.find(p=>p.id===postId).slides.length;
  el.innerHTML = `
    <div class="paper-texture"></div>
    <div class="brand">BIG 5 RESEARCH</div>
    <div class="page">${String(slideIdx+1).padStart(2,"0")} / ${String(totalSlides).padStart(2,"0")}</div>
    ${slide.html}
    <div class="handle">@paternia</div>
    <div class="watermark">paternia.vercel.app</div>
  `;
  return el;
}

const renderRoot = document.getElementById("renderRoot");
const postsContainer = document.getElementById("posts");
const statusEl = document.getElementById("status");

function buildAll(){
  renderRoot.innerHTML = "";
  postsContainer.innerHTML = "";
  POSTS.forEach((post)=>{
    // Render slides to renderRoot
    post.slides.forEach((s, idx)=>{
      const slideEl = renderSlide(post.id, idx, s);
      renderRoot.appendChild(slideEl);
    });

    // Build post card UI
    const postDiv = document.createElement("div");
    postDiv.className = "post";
    postDiv.innerHTML = `
      <div class="post-head">
        <div>
          <span class="post-id">POST ${post.id}</span>
          <div class="post-title">${post.title}</div>
        </div>
        <button class="post-dl" data-post-id="${post.id}">8枚ZIP DL</button>
      </div>
      <div class="slides-grid" data-post-id="${post.id}"></div>
      <div class="caption-box">${post.caption}</div>
    `;
    const grid = postDiv.querySelector(".slides-grid");
    post.slides.forEach((s, idx)=>{
      const thumb = document.createElement("div");
      thumb.className = "slide-thumb";
      thumb.innerHTML = `<div class="scaled"></div>`;
      const clone = renderSlide(post.id, idx, s);
      thumb.querySelector(".scaled").appendChild(clone);
      thumb.addEventListener("click", ()=>downloadSlide(post.id, idx));
      grid.appendChild(thumb);
    });
    postDiv.querySelector(".post-dl").addEventListener("click",()=>downloadPost(post.id));
    postsContainer.appendChild(postDiv);
  });
  const totalSlides = POSTS.reduce((acc,p)=>acc+p.slides.length,0);
  statusEl.textContent = `${POSTS.length}投稿 × 合計${totalSlides}スライド 描画完了。各投稿のZIP or 全体ZIPでダウンロード。`;
}

async function captureSlide(postId, slideIdx){
  const el = renderRoot.querySelector(`.slide[data-slide-id="post-${postId}-${slideIdx}"]`);
  if (!el) return null;
  return await html2canvas(el,{width:1080,height:1920,scale:1,backgroundColor:null,useCORS:true,logging:false});
}

async function downloadSlide(postId, slideIdx){
  statusEl.textContent = `Post ${postId} / ${slideIdx+1}枚目 生成中…`;
  const c = await captureSlide(postId, slideIdx);
  if (!c) { statusEl.textContent = "失敗"; return; }
  c.toBlob((b)=>{
    const post = POSTS.find(p=>p.id===postId);
    saveAs(b, `paternia-${post.file}-${String(slideIdx+1).padStart(2,"0")}.png`);
    statusEl.textContent = `Post ${postId} / ${slideIdx+1}枚目 DL完了`;
  },"image/png");
}

async function downloadPost(postId){
  const post = POSTS.find(p=>p.id===postId);
  if (!post) return;
  const zip = new JSZip();
  for (let i=0; i<post.slides.length; i++){
    statusEl.textContent = `Post ${postId} ZIP生成 ${i+1}/${post.slides.length}…`;
    const c = await captureSlide(postId, i);
    if (!c) continue;
    const b64 = c.toDataURL("image/png").split(",")[1];
    zip.file(`${post.file}-${String(i+1).padStart(2,"0")}.png`, b64, {base64:true});
  }
  // caption.txt
  zip.file(`${post.file}-caption.txt`, post.caption);
  const b = await zip.generateAsync({type:"blob"});
  saveAs(b, `paternia-${post.file}.zip`);
  statusEl.textContent = `Post ${postId} ZIP DL完了`;
}

async function downloadAll(){
  const btn = document.getElementById("dlAllBtn");
  btn.disabled = true;
  const zip = new JSZip();
  const totalSlides = POSTS.reduce((acc,p)=>acc+p.slides.length,0);
  let idx = 0;
  for (const post of POSTS){
    for (let i=0; i<post.slides.length; i++){
      idx++;
      statusEl.textContent = `全体ZIP生成 ${idx}/${totalSlides} (Post ${post.id})…`;
      const c = await captureSlide(post.id, i);
      if (!c) continue;
      const b64 = c.toDataURL("image/png").split(",")[1];
      zip.file(`${post.file}/${post.file}-${String(i+1).padStart(2,"0")}.png`, b64, {base64:true});
    }
    zip.file(`${post.file}/${post.file}-caption.txt`, post.caption);
  }
  statusEl.textContent = "ZIP書き出し中…";
  const b = await zip.generateAsync({type:"blob"});
  saveAs(b, "paternia-simple-posts-all.zip");
  btn.disabled = false;
  statusEl.textContent = `全${totalSlides}スライド DL完了`;
}

document.getElementById("dlAllBtn").addEventListener("click", downloadAll);
document.getElementById("reloadBtn").addEventListener("click", buildAll);
window.addEventListener("load",()=>{
  if(document.fonts && document.fonts.ready){
    document.fonts.ready.then(()=>setTimeout(buildAll,250));
  }else{setTimeout(buildAll,500);}
});
