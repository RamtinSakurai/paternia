<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>paternia TikTok Slide Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kiwi+Maru:wght@400;500&family=M+PLUS+Rounded+1c:wght@500;700;800&family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
<style>
  :root{
    --bg:#0a0a1a;
    --bg-card:#12122a;
    --accent:#9d8fff;
    --text:#ffffff;
    --text-muted:#b4b4cc;
    --axis-o:#00d4ff;
    --axis-c:#ffb020;
    --axis-e:#ff6b6b;
    --axis-a:#7ee8c7;
    --axis-n:#a78bfa;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:"M PLUS Rounded 1c","Kiwi Maru",sans-serif;
    padding:24px;
    min-height:100vh;
  }
  header{
    max-width:1200px;
    margin:0 auto 24px;
    padding:20px;
    border:1px solid rgba(255,255,255,0.1);
    border-radius:16px;
    background:var(--bg-card);
  }
  header h1{
    font-family:"Fredoka",sans-serif;
    font-size:24px;
    color:var(--accent);
    margin-bottom:8px;
  }
  header p{font-size:14px;color:var(--text-muted);line-height:1.7}
  .controls{
    max-width:1200px;
    margin:0 auto 24px;
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }
  .controls button{
    background:var(--accent);
    color:#000;
    border:none;
    padding:10px 20px;
    border-radius:8px;
    font-weight:700;
    cursor:pointer;
    font-family:inherit;
    font-size:14px;
    transition:transform 0.1s;
  }
  .controls button:hover{transform:translateY(-1px);opacity:0.9}
  .controls button:disabled{opacity:0.5;cursor:wait}
  .controls .secondary{
    background:transparent;
    border:1px solid var(--accent);
    color:var(--accent);
  }
  .status{
    max-width:1200px;
    margin:0 auto 24px;
    padding:12px 20px;
    border-radius:8px;
    background:rgba(157,143,255,0.1);
    border:1px solid rgba(157,143,255,0.3);
    color:var(--text-muted);
    font-size:13px;
    min-height:44px;
    display:flex;
    align-items:center;
  }
  .posts{max-width:1200px;margin:0 auto;display:flex;flex-direction:column;gap:40px}
  .post{
    border:1px solid rgba(255,255,255,0.1);
    border-radius:16px;
    padding:20px;
    background:var(--bg-card);
  }
  .post-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:16px;
  }
  .post-title{font-size:18px;font-weight:700}
  .post-id{font-family:"Fredoka",sans-serif;color:var(--accent);font-size:12px}
  .slides-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
    gap:12px;
  }
  .slide-thumb{
    aspect-ratio:9/16;
    background:var(--bg);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:8px;
    overflow:hidden;
    position:relative;
    cursor:pointer;
    transition:transform 0.1s;
  }
  .slide-thumb:hover{transform:scale(1.03);border-color:var(--accent)}
  .slide-thumb .scaled{
    width:1080px;
    height:1920px;
    transform:scale(calc(160/1080));
    transform-origin:top left;
    position:absolute;
    top:0;
    left:0;
  }
  .post .post-caption{
    margin-top:16px;
    padding:12px;
    background:rgba(255,255,255,0.05);
    border-radius:8px;
    font-size:12px;
    color:var(--text-muted);
    line-height:1.7;
    white-space:pre-wrap;
  }

  /* === Actual slide rendering === */
  .slide{
    width:1080px;
    height:1920px;
    background:linear-gradient(135deg,#0a0a1a 0%,#1a1030 100%);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:120px 80px;
    position:relative;
    font-family:"M PLUS Rounded 1c",sans-serif;
    color:#fff;
    overflow:hidden;
  }
  .slide::before{
    content:"";
    position:absolute;
    inset:0;
    background-image:radial-gradient(circle at 20% 30%,rgba(157,143,255,0.15) 0%,transparent 40%),radial-gradient(circle at 80% 70%,rgba(0,212,255,0.08) 0%,transparent 40%);
    pointer-events:none;
  }
  .slide-content{
    position:relative;
    z-index:2;
    text-align:center;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:40px;
  }
  .slide-main{
    font-size:120px;
    font-weight:800;
    line-height:1.4;
    letter-spacing:0.02em;
    text-shadow:0 4px 40px rgba(157,143,255,0.4);
  }
  .slide-main.size-md{font-size:96px}
  .slide-main.size-sm{font-size:72px}
  .slide-main .accent{color:#9d8fff}
  .slide-main .danger{color:#ff7b7b}
  .slide-main .gold{color:#ffd154}
  .slide-sub{
    font-size:52px;
    line-height:1.6;
    color:#c9c9e0;
    font-weight:500;
  }
  .slide-caption{
    position:absolute;
    bottom:100px;
    font-size:32px;
    color:#8888a8;
    font-weight:400;
  }
  .slide-brand{
    position:absolute;
    top:80px;
    right:80px;
    font-family:"Fredoka",sans-serif;
    font-size:40px;
    color:#9d8fff;
    opacity:0.85;
    letter-spacing:0.05em;
    text-transform:lowercase;
  }
  .slide-badge{
    position:absolute;
    top:80px;
    left:80px;
    font-family:"Fredoka",sans-serif;
    font-size:28px;
    color:#8888a8;
    letter-spacing:0.2em;
  }
  /* Research credibility badge -- visible on every slide */
  .slide-research{
    position:absolute;
    top:180px;
    left:80px;
    font-size:26px;
    color:#d4c9ff;
    background:rgba(157,143,255,0.18);
    border:2px solid rgba(157,143,255,0.45);
    padding:10px 22px;
    border-radius:999px;
    font-weight:700;
    letter-spacing:0.05em;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .slide-research::before{
    content:"📊";
    font-size:28px;
  }

  /* Hook slide (1st slide) -- extra impact */
  .slide.is-hook{
    background:radial-gradient(circle at 50% 30%,#1a1040 0%,#0a0a1a 70%);
  }
  .slide.is-hook::after{
    content:"";
    position:absolute;
    inset:0;
    background:radial-gradient(circle at 50% 50%,rgba(157,143,255,0.2) 0%,transparent 55%);
    pointer-events:none;
  }
  .slide.is-hook .slide-main{
    font-size:160px;
    font-weight:900;
    text-shadow:0 8px 60px rgba(157,143,255,0.6);
  }
  .slide.is-hook .slide-main.size-md{font-size:130px}
  .slide.is-hook .slide-main.size-sm{font-size:96px}
  .slide.is-hook .slide-sub{
    font-size:56px;
    color:#d9d9f0;
    font-weight:600;
    margin-top:20px;
  }

  /* Swipe-indicator pulse (hook slides only) */
  .swipe-hint{
    position:absolute;
    bottom:110px;
    left:50%;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:10px;
    z-index:5;
    pointer-events:none;
    animation:swipePulse 1.4s ease-in-out infinite;
  }
  .swipe-hint .arrow{
    font-size:96px;
    line-height:1;
    color:rgba(255,255,255,0.92);
    font-weight:400;
    letter-spacing:-0.05em;
    text-shadow:0 4px 24px rgba(255,255,255,0.25);
  }
  .swipe-hint .label{
    font-size:32px;
    color:rgba(255,255,255,0.7);
    font-weight:600;
    letter-spacing:0.28em;
    font-family:"Fredoka",sans-serif;
  }
  @keyframes swipePulse{
    0%,100%{transform:translateX(-50%) translateX(0);opacity:0.7}
    50%{transform:translateX(-50%) translateX(28px);opacity:1}
  }

  /* Big number emphasis block for hook */
  .hook-number-block{
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:24px;
  }
  .hook-number{
    font-family:"Fredoka",sans-serif;
    font-size:380px;
    font-weight:600;
    color:#ffd154;
    line-height:0.95;
    text-shadow:0 12px 80px rgba(255,209,84,0.5);
    max-width:900px;
    text-align:center;
  }
  .hook-number.size-sm{font-size:260px}
  .hook-number.size-xs{font-size:200px}
  .hook-number.color-accent{color:#b9aeff;text-shadow:0 12px 80px rgba(157,143,255,0.6)}
  .hook-number.color-danger{color:#ff8c8c;text-shadow:0 12px 80px rgba(255,107,107,0.5)}
  .hook-number .unit{font-size:0.5em;color:#e0e0ef;margin-left:10px}
  .hook-label{
    font-size:64px;
    font-weight:700;
    color:#fff;
    line-height:1.4;
    text-align:center;
  }
  .hook-compare{
    display:flex;
    flex-direction:column;
    gap:40px;
    align-items:stretch;
    width:100%;
  }
  .hook-compare-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:44px 56px;
    border-radius:32px;
    font-size:82px;
    font-weight:800;
    gap:24px;
  }
  .hook-compare-row.bad{background:rgba(255,123,123,0.15);border:3px solid rgba(255,123,123,0.4);color:#ffb0b0}
  .hook-compare-row.good{background:rgba(157,143,255,0.2);border:3px solid rgba(157,143,255,0.55);color:#d4c9ff}
  .hook-compare-row .num{
    font-family:"Fredoka",sans-serif;
    font-size:112px;
    white-space:nowrap;
  }
  .hook-compare .hook-label{
    font-size:68px;
    max-width:900px;
  }
  .compare{
    display:flex;
    gap:60px;
    width:100%;
    justify-content:center;
    align-items:stretch;
  }
  .compare-col{
    flex:1;
    padding:60px 40px;
    border-radius:32px;
    display:flex;
    flex-direction:column;
    gap:24px;
    align-items:center;
  }
  .compare-col.col-mbti{background:rgba(255,123,123,0.1);border:2px solid rgba(255,123,123,0.3)}
  .compare-col.col-big5{background:rgba(157,143,255,0.15);border:2px solid rgba(157,143,255,0.5)}
  .compare-title{font-size:72px;font-weight:800}
  .compare-col.col-mbti .compare-title{color:#ff9b9b}
  .compare-col.col-big5 .compare-title{color:#b9aeff}
  .compare-body{font-size:52px;line-height:1.6;font-weight:500;color:#e0e0ef}
  .list{text-align:left;display:flex;flex-direction:column;gap:20px}
  .list-item{font-size:68px;font-weight:700;line-height:1.4}
  .num-display{
    font-family:"Fredoka",sans-serif;
    font-size:280px;
    font-weight:600;
    color:#9d8fff;
    line-height:1;
    text-shadow:0 8px 60px rgba(157,143,255,0.5);
  }
  .num-display .unit{font-size:120px;color:#c9c9e0}
  .arrow-next{
    display:flex;
    align-items:center;
    gap:20px;
    font-size:60px;
    font-weight:700;
    color:#ffd154;
  }
  .cta-box{
    padding:40px 50px;
    border-radius:32px;
    background:rgba(157,143,255,0.15);
    border:3px solid rgba(157,143,255,0.5);
    display:flex;
    flex-direction:column;
    gap:20px;
    align-items:center;
  }
  .cta-url{
    font-family:"Fredoka",sans-serif;
    font-size:56px;
    color:#9d8fff;
    font-weight:600;
  }
  .render-stage{
    position:fixed;
    top:0;
    left:-99999px;
    pointer-events:none;
    z-index:-1;
  }
</style>
</head>

// ===================================================
// Slide rendering
// ===================================================
function renderSlide(postId, slideIdx, slide){
  const s = document.createElement("div");
  const isHook = slide.type === "hook-big" || slide.type === "hook";
  s.className = "slide" + (isHook ? " is-hook" : "");
  s.dataset.slideId = `post-${postId}-slide-${slideIdx+1}`;
  s.innerHTML = `
    <div class="slide-brand">paternia</div>
    <div class="slide-research">BIG 5 研究に基づく</div>
    <div class="slide-badge">${String(slideIdx+1).padStart(2,"0")} / ${POSTS.find(p=>p.id===postId).slides.length}</div>
    ${renderSlideInner(slide)}
    ${slide.caption ? `<div class="slide-caption">${slide.caption}</div>` : ""}
    ${isHook ? `<div class="swipe-hint"><span class="arrow">→</span><span class="label">SWIPE</span></div>` : ""}
  `;
  return s;
}

function renderSlideInner(slide){
  const mc = slide.mainClass || "";
  switch(slide.type){
    case "hook":
    case "fact":
    case "next":
      return `<div class="slide-content">
        <div class="slide-main ${mc}">${slide.main.replace(/\n/g,"<br>")}</div>
        ${slide.sub ? `<div class="slide-sub">${slide.sub}</div>` : ""}
      </div>`;
    case "hook-big":
      const numStr = slide.number ? String(slide.number) : "";
      // Auto-size: longer numbers get smaller font
      let numSize = "";
      if (numStr.length >= 6) numSize = "size-xs";
      else if (numStr.length >= 4) numSize = "size-sm";
      return `<div class="slide-content">
        <div class="hook-number-block">
          ${slide.number ? `<div class="hook-number ${numSize} ${slide.numberColor || ""}">${slide.number}${slide.unit ? `<span class="unit">${slide.unit}</span>` : ""}</div>` : ""}
          <div class="hook-label">${slide.label.replace(/\n/g,"<br>")}</div>
        </div>
        ${slide.sub ? `<div class="slide-sub">${slide.sub.replace(/\n/g,"<br>")}</div>` : ""}
      </div>`;
    case "hook-compare":
      return `<div class="slide-content">
        <div class="hook-label" style="margin-bottom:40px">${slide.label.replace(/\n/g,"<br>")}</div>
        <div class="hook-compare">
          <div class="hook-compare-row bad">
            <span>${slide.badName}</span>
            <span class="num">${slide.badValue}</span>
          </div>
          <div class="hook-compare-row good">
            <span>${slide.goodName}</span>
            <span class="num">${slide.goodValue}</span>
          </div>
        </div>
      </div>`;
    case "compare":
      return `<div class="slide-content">
        <div class="compare">
          <div class="compare-col col-mbti">
            <div class="compare-title">${slide.mbtiTitle}</div>
            <div class="compare-body">${slide.mbtiBody.replace(/\n/g,"<br>")}</div>
          </div>
          <div class="compare-col col-big5">
            <div class="compare-title">${slide.big5Title}</div>
            <div class="compare-body">${slide.big5Body.replace(/\n/g,"<br>")}</div>
          </div>
        </div>
      </div>`;
    case "cta":
      return `<div class="slide-content">
        <div class="slide-main size-md">${slide.main.replace(/\n/g,"<br>")}</div>
        <div class="cta-box">
          <div class="cta-url">${slide.ctaUrl}</div>
          <div style="font-size:34px;color:#b9aeff;margin-top:8px">スクショして、アクセス</div>
        </div>
      </div>`;
    default:
      return `<div class="slide-content"><div class="slide-main">${slide.main}</div></div>`;
  }
}

const postsContainer = document.getElementById("posts");
POSTS.forEach(post=>{
  const postEl = document.createElement("div");
  postEl.className = "post";
  postEl.innerHTML = `
    <div class="post-header">
      <div>
        <span class="post-id">POST ${String(post.id).padStart(2,"0")}</span>
      </div>
      <button class="generate-post" data-post-id="${post.id}">この投稿を生成</button>
    </div>
    <div class="post-title">${post.title}</div>
    <div class="slides-grid"></div>
    <div class="post-caption">${post.caption}</div>
  `;
  const grid = postEl.querySelector(".slides-grid");
  post.slides.forEach((slide, idx)=>{
    const thumb = document.createElement("div");
    thumb.className = "slide-thumb";
    const scaled = document.createElement("div");
    scaled.className = "scaled";
    const slideEl = renderSlide(post.id, idx, slide);
    scaled.appendChild(slideEl);
    thumb.appendChild(scaled);
    grid.appendChild(thumb);
  });
  postsContainer.appendChild(postEl);
});

// ===================================================
// Export
// ===================================================
const status = document.getElementById("status");
const stage = document.getElementById("render-stage");

async function captureSlide(post, slideIdx){
  const slide = post.slides[slideIdx];
  const el = renderSlide(post.id, slideIdx, slide);
  stage.innerHTML = "";
  stage.appendChild(el);
  // Give the browser a moment to apply fonts/styles
  await new Promise(r=>setTimeout(r,80));
  const canvas = await html2canvas(el, {
    width:1080,
    height:1920,
    scale:1,
    backgroundColor:"#0a0a1a",
    logging:false,
    useCORS:true,
  });
  return new Promise(resolve=>{
    canvas.toBlob(b=>resolve(b),"image/png");
  });
}

async function generatePost(postId){
  const post = POSTS.find(p=>p.id===postId);
  if(!post) return;
  const zip = new JSZip();
  const folder = zip.folder(`post-${String(post.id).padStart(2,"0")}_${post.title}`);
  for(let i=0;i<post.slides.length;i++){
    status.textContent = `投稿${post.id}: ${i+1}/${post.slides.length} 枚目を生成中…`;
    const blob = await captureSlide(post, i);
    folder.file(`${String(i+1).padStart(2,"0")}.png`, blob);
  }
  // Also include caption.txt
  folder.file("caption.txt", post.caption);
  status.textContent = `投稿${post.id}: ZIP作成中…`;
  const zipBlob = await zip.generateAsync({type:"blob"});
  saveAs(zipBlob, `paternia_post-${String(post.id).padStart(2,"0")}.zip`);
  status.textContent = `投稿${post.id} のZIPをダウンロードしました ✓`;
}

async function generateAll(){
  document.querySelectorAll("button").forEach(b=>b.disabled=true);
  try{
    const zip = new JSZip();
    for(const post of POSTS){
      const folder = zip.folder(`post-${String(post.id).padStart(2,"0")}_${post.title}`);
      for(let i=0;i<post.slides.length;i++){
        status.textContent = `投稿${post.id} (${POSTS.indexOf(post)+1}/${POSTS.length}) - スライド ${i+1}/${post.slides.length}`;
        const blob = await captureSlide(post, i);
        folder.file(`${String(i+1).padStart(2,"0")}.png`, blob);
      }
      folder.file("caption.txt", post.caption);
    }
    status.textContent = `全投稿のZIP作成中…`;
    const zipBlob = await zip.generateAsync({type:"blob"});
    saveAs(zipBlob, `paternia_tiktok_slides_all.zip`);
    status.textContent = `完了 ✓ 全10投稿のZIPをダウンロードしました`;
  } catch(e){
    status.textContent = `エラー: ${e.message}`;
    console.error(e);
  } finally {
    document.querySelectorAll("button").forEach(b=>b.disabled=false);
  }
}

// Event listeners
document.getElementById("btn-all").addEventListener("click",generateAll);
document.querySelectorAll(".generate-post").forEach(btn=>{
  btn.addEventListener("click",()=>{
    const id = Number(btn.dataset.postId);
    document.querySelectorAll("button").forEach(b=>b.disabled=true);
    generatePost(id).finally(()=>{
      document.querySelectorAll("button").forEach(b=>b.disabled=false);
    });
  });
});

// Preview toggle (zoom thumbnails)
let zoomed = false;
document.getElementById("btn-preview-toggle").addEventListener("click",()=>{
  zoomed = !zoomed;
  document.querySelectorAll(".slides-grid").forEach(g=>{
    g.style.gridTemplateColumns = zoomed
      ? "repeat(auto-fill,minmax(280px,1fr))"
      : "repeat(auto-fill,minmax(160px,1fr))";
  });
  document.querySelectorAll(".slide-thumb .scaled").forEach(s=>{
    s.style.transform = zoomed
      ? "scale(calc(280/1080))"
      : "scale(calc(160/1080))";
  });
});

// Click thumbnail to open full slide in new window
document.querySelectorAll(".slide-thumb").forEach(thumb=>{
  thumb.addEventListener("click",()=>{
    const w = window.open("","_blank");
    w.document.write(`<html><head><title>Preview</title><style>body{margin:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh}</style></head><body></body></html>`);
    const clone = thumb.querySelector(".scaled").cloneNode(true);
    clone.style.transform = "scale(0.4)";
    clone.style.position = "static";
    w.document.body.appendChild(clone);
  });
});
